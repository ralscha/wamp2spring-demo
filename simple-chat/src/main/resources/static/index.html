<!DOCTYPE html>
<html>
<head>
<title>wamp2spring-demo-simple-chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-design-icons-iconfont@6.7.0/dist/material-design-icons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/material-components-web@14.0.0/dist/material-components-web.min.css">
<link rel="stylesheet" href="app.css">
</head>

<body>
	<main class="chat-shell">
		<label class="input-label" for="msgInput">Enter your message...</label>
		<input class="userinput" type="text" id="msgInput" name="message" autocomplete="off">

		<button id="sendButton" class="mdc-button mdc-button--raised send-button" type="submit" name="action">
			<span class="mdc-button__ripple"></span>
			<span class="mdc-button__label">Send Message</span>
		</button>

		<div id="log"></div>
	</main>

	<script defer src="https://cdn.jsdelivr.net/npm/material-components-web@14.0.0/dist/material-components-web.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/autobahn-browser@22.11.1/autobahn.min.js"></script>
	<script src="app.js"></script>
</body>

</html>
